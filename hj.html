<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Heartbeat Eclipse | CSS Loading Animation</title>
  <style>
    /* ========== RESET & GLOBAL ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #0a0718, #02010a);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* animated deep-space shimmer (pure CSS particle illusion) */
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(2px 2px at 15% 40%, rgba(255, 120, 160, 0.2), transparent),
                        radial-gradient(3px 3px at 85% 70%, rgba(255, 80, 120, 0.25), transparent),
                        repeating-linear-gradient(45deg, rgba(255, 200, 220, 0.02) 0px, rgba(255, 200, 220, 0.02) 2px, transparent 2px, transparent 8px);
      background-size: 60px 60px, 80px 80px, 16px 16px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
      animation: starDrift 120s linear infinite;
    }

    @keyframes starDrift {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 200px 200px, -300px 150px, 100px 100px; }
    }

    /* main container — all magic happens here */
    .loading-universe {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    /* ========== CORE HEART SHAPE (pure CSS) ========== */
    .heart-core {
      position: relative;
      width: 110px;
      height: 100px;
      transform: rotate(45deg);
      z-index: 30;
      cursor: default;
      animation: heartbeatRhythm 1.2s cubic-bezier(0.45, 0.9, 0.55, 1.1) infinite, glowPulse 1.2s ease-in-out infinite;
      filter: drop-shadow(0 0 12px #ff2a5e) drop-shadow(0 0 20px #ff1a4f);
    }

    /* heart block + pseudo-elements */
    .heart-core::before,
    .heart-core::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 100px;
      background: radial-gradient(circle at 35% 35%, #ff3b6f, #e61a4d);
      border-radius: 50%;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 3px 3px 12px rgba(255,255,200,0.5);
    }

    .heart-core::before {
      left: -55px;
      top: 0;
      background: radial-gradient(circle at 65% 35%, #ff477a, #e61a4d);
    }

    .heart-core::after {
      left: 0;
      top: -55px;
      background: radial-gradient(circle at 35% 65%, #ff477a, #e61a4d);
    }

    /* shimmer / wet gloss effect on heart */
    .heart-core .glint {
      position: absolute;
      top: 15%;
      left: 15%;
      width: 35%;
      height: 30%;
      background: radial-gradient(circle, rgba(255,255,245,0.7) 5%, rgba(255,255,245,0) 80%);
      border-radius: 50%;
      transform: rotate(-25deg);
      pointer-events: none;
      z-index: 5;
      opacity: 0.6;
      animation: shimmerMove 2.8s infinite alternate;
    }

    /* heartbeat scaling + subtle squash */
    @keyframes heartbeatRhythm {
      0% { transform: rotate(45deg) scale(0.96); }
      25% { transform: rotate(45deg) scale(1.12); }
      35% { transform: rotate(45deg) scale(1.08); }
      45% { transform: rotate(45deg) scale(1.14); }
      55% { transform: rotate(45deg) scale(1.05); }
      70% { transform: rotate(45deg) scale(1); }
      100% { transform: rotate(45deg) scale(0.96); }
    }

    /* glowing aura animation (extra intense) */
    @keyframes glowPulse {
      0% { filter: drop-shadow(0 0 6px #ff2a5e) drop-shadow(0 0 12px #ff0066); }
      50% { filter: drop-shadow(0 0 28px #ff5c8f) drop-shadow(0 0 40px #ff3b6f) drop-shadow(0 0 10px #ffa0c0); }
      100% { filter: drop-shadow(0 0 6px #ff2a5e) drop-shadow(0 0 12px #ff0066); }
    }

    @keyframes shimmerMove {
      0% { opacity: 0.3; transform: translate(-2px, -2px) rotate(-25deg) scale(0.9);}
      100% { opacity: 0.9; transform: translate(5px, 5px) rotate(-20deg) scale(1.2);}
    }

    /* ========== RADIAL / RINGS (loading rotation) ========== */
    .ring-outer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 260px;
      margin-left: -130px;
      margin-top: -130px;
      border-radius: 50%;
      border: 3px dashed rgba(255, 100, 150, 0.8);
      box-shadow: 0 0 20px rgba(255, 80, 120, 0.6), inset 0 0 12px rgba(255, 120, 160, 0.4);
      animation: spinRing 10s linear infinite;
      z-index: 5;
    }

    .ring-inner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      margin-left: -100px;
      margin-top: -100px;
      border-radius: 50%;
      border: 2px dotted rgba(255, 180, 200, 0.9);
      box-shadow: 0 0 18px rgba(255, 80, 140, 0.5);
      animation: spinRingReverse 14s linear infinite;
      z-index: 4;
    }

    /* third ethereal ring (slow, glowing) */
    .ring-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      margin-left: -150px;
      margin-top: -150px;
      border-radius: 50%;
      background: radial-gradient(circle, transparent 70%, rgba(255, 70, 120, 0.2) 100%);
      filter: blur(4px);
      animation: pulseRing 2.2s infinite alternate;
      z-index: 2;
    }

    @keyframes spinRing {
      0% { transform: rotate(0deg); border-color: rgba(255, 100, 150, 0.9);}
      50% { border-color: rgba(255, 160, 200, 1); box-shadow: 0 0 30px #ff6699;}
      100% { transform: rotate(360deg); border-color: rgba(255, 100, 150, 0.9);}
    }

    @keyframes spinRingReverse {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(-360deg);}
    }

    @keyframes pulseRing {
      0% { opacity: 0.3; transform: scale(0.92); box-shadow: 0 0 0px #ff4080;}
      100% { opacity: 0.9; transform: scale(1.08); box-shadow: 0 0 28px #ff6080; }
    }

    /* ========== ORBITING PARTICLES (extra cosmic effect) ========== */
    .orbital-swarm {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 15;
      pointer-events: none;
      animation: rotateSwarm 32s linear infinite;
    }

    .orbital-swarm span {
      position: absolute;
      width: 8px;
      height: 8px;
      background: radial-gradient(circle, #ffb6d0, #ff3f6b);
      border-radius: 50%;
      box-shadow: 0 0 12px #ff7799, 0 0 4px #ff3f6b;
      opacity: 0.7;
      animation: particleGlow 1.6s infinite alternate;
    }

    /* different positions and orbit radii (magic floating dance) */
    .orbital-swarm span:nth-child(1) { top: 12%; left: 68%; animation-duration: 1.2s; width: 6px; height: 6px; background: #ff88aa;}
    .orbital-swarm span:nth-child(2) { top: 78%; left: 20%; width: 9px; height: 9px; animation-duration: 1.8s; background: #ff5c8a;}
    .orbital-swarm span:nth-child(3) { top: 35%; left: 85%; width: 5px; height: 5px; animation-duration: 2s; box-shadow: 0 0 10px #ff88bb;}
    .orbital-swarm span:nth-child(4) { top: 62%; left: 74%; width: 7px; height: 7px; animation-duration: 1.4s; background: #ff4d7a;}
    .orbital-swarm span:nth-child(5) { top: 20%; left: 22%; width: 6px; height: 6px; animation-duration: 2.2s;}
    .orbital-swarm span:nth-child(6) { top: 82%; left: 85%; width: 8px; height: 8px; animation-duration: 1.3s; background: #ff99bb;}
    .orbital-swarm span:nth-child(7) { top: 45%; left: 12%; width: 5px; height: 5px; animation-duration: 1.9s;}
    .orbital-swarm span:nth-child(8) { top: 58%; left: 92%; width: 7px; height: 7px; animation-duration: 1.5s;}
    .orbital-swarm span:nth-child(9) { top: 86%; left: 52%; width: 6px; height: 6px; animation-duration: 2.4s;}
    .orbital-swarm span:nth-child(10) { top: 8%; left: 42%; width: 5px; height: 5px; animation-duration: 1.1s;}
    .orbital-swarm span:nth-child(11) { top: 28%; left: 55%; width: 9px; height: 9px; animation-duration: 1.7s; background: #ff6699;}
    .orbital-swarm span:nth-child(12) { top: 72%; left: 35%; width: 6px; height: 6px; animation-duration: 2s;}

    @keyframes rotateSwarm {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    @keyframes particleGlow {
      0% { opacity: 0.3; transform: scale(0.6); box-shadow: 0 0 4px #ff4470;}
      100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 18px #ff99bb;}
    }

    /* ========== PULSE RIPPLE (extra dynamic) ========== */
    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 140px;
      height: 140px;
      margin-left: -70px;
      margin-top: -70px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 80, 120, 0.2), transparent 70%);
      animation: rippleBlast 1.8s ease-out infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes rippleBlast {
      0% {
        transform: scale(0.7);
        opacity: 0.8;
        box-shadow: 0 0 0px 0px rgba(255, 60, 100, 0.7);
      }
      100% {
        transform: scale(2.4);
        opacity: 0;
        box-shadow: 0 0 30px 20px rgba(255, 80, 140, 0);
      }
    }

    /* ========== LOADING TEXT WITH GLOW & HEARTBEAT SYNC ========== */
    .loading-caption {
      margin-top: 55px;
      font-weight: 600;
      letter-spacing: 3px;
      font-size: 1.1rem;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffb3c6, #ff5c8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(255, 80, 120, 0.7);
      animation: textBreath 1.6s ease-in-out infinite;
      backdrop-filter: blur(3px);
      z-index: 25;
      position: relative;
      font-family: 'Segoe UI', 'Poppins', monospace;
    }

    .loading-caption::after {
      content: "•••";
      display: inline-block;
      width: 36px;
      text-align: left;
      animation: dotsPulse 1.2s step-end infinite;
      letter-spacing: 2px;
      color: #ff7e9e;
    }

    @keyframes textBreath {
      0% { opacity: 0.6; letter-spacing: 2px; text-shadow: 0 0 8px #ff3f6b;}
      50% { opacity: 1; letter-spacing: 5px; text-shadow: 0 0 24px #ff8aae;}
      100% { opacity: 0.6; letter-spacing: 2px; text-shadow: 0 0 8px #ff3f6b;}
    }

    @keyframes dotsPulse {
      0% { content: "•••"; opacity: 0.5;}
      33% { content: "•• •"; opacity: 1;}
      66% { content: "• ••"; opacity: 1;}
      100% { content: "•••"; opacity: 0.5;}
    }

    /* ========== ADDITIONAL GLOW ORB (magic haze behind heart) ========== */
    .heart-halo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 180px;
      margin-left: -90px;
      margin-top: -90px;
      background: radial-gradient(circle, rgba(255, 80, 140, 0.3), transparent 70%);
      filter: blur(18px);
      border-radius: 50%;
      z-index: 0;
      animation: haloPulse 1.6s infinite alternate;
    }

    @keyframes haloPulse {
      0% { transform: scale(0.8); opacity: 0.5;}
      100% { transform: scale(1.3); opacity: 1;}
    }

    /* ========== SPARKLES / FLYING HEART DUST ========== */
    .sparkle-dust {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 12;
    }
    .sparkle-dust i {
      position: absolute;
      display: block;
      width: 3px;
      height: 3px;
      background: #ff99bb;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff5c8a;
      opacity: 0;
      animation: dustFloat 3s infinite;
    }
    /* random positions for tiny floating glitter */
    .sparkle-dust i:nth-child(1) { top: 15%; left: 30%; animation-delay: 0s; animation-duration: 2.2s;}
    .sparkle-dust i:nth-child(2) { top: 70%; left: 85%; animation-delay: 0.5s; animation-duration: 2.8s; width: 4px; height: 4px;}
    .sparkle-dust i:nth-child(3) { top: 45%; left: 18%; animation-delay: 1s; animation-duration: 1.9s;}
    .sparkle-dust i:nth-child(4) { top: 82%; left: 45%; animation-delay: 0.2s; animation-duration: 2.5s;}
    .sparkle-dust i:nth-child(5) { top: 25%; left: 72%; animation-delay: 1.3s; animation-duration: 3s;}
    .sparkle-dust i:nth-child(6) { top: 58%; left: 60%; animation-delay: 0.7s; animation-duration: 2.1s;}
    .sparkle-dust i:nth-child(7) { top: 90%; left: 20%; animation-delay: 1.8s; width: 2px;}
    .sparkle-dust i:nth-child(8) { top: 10%; left: 88%; animation-delay: 0.9s; animation-duration: 2.4s;}

    @keyframes dustFloat {
      0% { transform: translateY(0px) scale(0.2); opacity: 0;}
      20% { opacity: 0.8; transform: translateY(-12px) scale(1);}
      80% { opacity: 0.6; transform: translateY(-35px) scale(0.8);}
      100% { transform: translateY(-60px) scale(0); opacity: 0;}
    }

    /* ensure heart core gets extra z-index */
    .heart-core {
      z-index: 40;
    }
    .glint {
      z-index: 45;
    }

    /* responsive adjustment */
    @media (max-width: 500px) {
      .loading-universe { transform: scale(0.85); }
    }

    /* disable animations if user prefers reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="loading-universe">
    <!-- multiple glowing rings (loading rotation) -->
    <div class="ring-glow"></div>
    <div class="ring-outer"></div>
    <div class="ring-inner"></div>
    
    <!-- powerful halo background -->
    <div class="heart-halo"></div>
    
    <!-- ripple shockwave effect -->
    <div class="ripple-effect"></div>
    
    <!-- ORBITING PARTICLE SWARM (dynamic loading spark) -->
    <div class="orbital-swarm">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span>
    </div>
    
    <!-- main heart structure (pure CSS) -->
    <div class="heart-core">
      <div class="glint"></div>
    </div>
    
    <!-- micro floating sparkles (extra shimmer) -->
    <div class="sparkle-dust">
      <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
    </div>
    
    <!-- loading text with animated ellipsis -->
    <div class="loading-caption">heart loading</div>
  </div>
</body>
</html>
